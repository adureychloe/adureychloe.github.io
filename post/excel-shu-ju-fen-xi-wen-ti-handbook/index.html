<h2 id="1-无法使用日期筛选">1、无法使用日期筛选</h2>
<ul>
<li>
<p>原因：<br>
日期列可能是文本格式，可以看看数字是否靠右排列，或使用ISTEXT()函数检验。这时使用设置单元格格式改成日期格式是没用的。</p>
</li>
<li>
<p>解决方法：<br>
点击数据-分列，不用真的分，在最后选项中选择日期。</p>
</li>
</ul>
